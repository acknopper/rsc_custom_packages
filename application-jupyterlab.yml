---
- name: Create JupyterLab desktop and menu launchers
  hosts: localhost
  connection: local
  gather_facts: true

  tasks:
    - name: Wait for system to become reachable
      wait_for_connection:
        timeout: 300

  vars:
    conda_root: /etc/miniconda
    conda_env_name: custom-kernel
    launcher_script: "start_jupyterlab.sh"
    hosts_entries:
      - { ip: "104.19.144.37", name: "conda.anaconda.org" }
      - { ip: "104.19.145.37", name: "conda.anaconda.org" }
      - { ip: "104.16.32.241", name: "repo.anaconda.com" }
      - { ip: "104.16.191.158", name: "repo.anaconda.com" }
      - { ip: "151.101.0.223", name: "pypi.org" }
      - { ip: "151.101.64.223", name: "pypi.org" }
      - { ip: "151.101.128.223", name: "pypi.org" }
      - { ip: "18.239.18.73", name: "cloud.r-project.org" }
      - { ip: "18.239.18.61", name: "cloud.r-project.org" }
      - { ip: "18.239.18.39", name: "cloud.r-project.org" }
      - { ip: "18.239.18.118", name: "cloud.r-project.org" }

  tasks:
    - name: Create JupyterLab wrapper script
      ansible.builtin.copy:
        dest: "/usr/local/bin/{{ launcher_script }}"
        mode: "0755"
        content: |
          #!/usr/bin/env bash
          set -euo pipefail
          source {{ conda_root }}/etc/profile.d/conda.sh
          conda activate {{ conda_env_name }}
          cd "$HOME"
          exec jupyter-lab

    - name: Create desktop entry for JupyterLab
      ansible.builtin.copy:
        dest: /usr/share/applications/jupyterlab.desktop
        mode: "0644"
        content: |
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=JupyterLab
          Comment=Start JupyterLab in conda env custom-env
          Exec="/usr/local/bin/{{ launcher_script }}"
          Terminal=false
          Icon=jupyterlab
          Categories=Development;Education;
          StartupNotify=true

    - name: Ensure /etc/hosts contains required entries
      ansible.builtin.lineinfile:
        path: /etc/hosts
        create: false
        state: present
        # add hosts for conda/pypi/cran channels
        search_string: "{{ item.name }}"
        line: >-
          {{ item.ip }}
          {{ item.name }}
      loop: "{{ hosts_entries }}"
